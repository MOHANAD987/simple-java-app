name: project1 workflow

on:
  push:
    branches:
      - main

jobs:
  first-workflow-job:
    name: first job
    runs-on: ubuntu-latest

    steps:
      - name: checkout steps
        uses: actions/checkout@v4
        with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

      - name: run maven
        run: mvn clean package
        shell: bash
